<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@500;600;700;800&display=swap" rel="stylesheet">
    <title>LORYB Ops Platform</title>
    <script>
      (function() {
        try {
          var persisted = localStorage.getItem('loryb_theme');
          var isDark = persisted === 'dark' || (!persisted && window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (isDark) document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root">
      <style>
        /* Initial splash screen styles before tailwind loads */
        #initial-loader {
          position: fixed;
          inset: 0;
          z-index: 9999;
          display: flex;
          align-items: center;
          justify-content: center;
          background-color: #f8fafc; /* light theme fallback */
          font-family: 'Inter', sans-serif;
        }
        html.dark #initial-loader { background-color: #0B1121; }
        .loader-wrapper {
          position: relative;
          display: flex;
          flex-direction: column;
          align-items: center;
        }
        .logo-bg {
          height: 80px;
          opacity: 0.2;
        }
        .logo-fg {
          position: absolute;
          top: 0;
          left: 0;
          height: 80px;
          animation: logo-fill 2s ease-in-out infinite;
        }
        @keyframes logo-fill {
          0% { clip-path: inset(100% 0 0 0); }
          50% { clip-path: inset(0 0 0 0); }
          100% { clip-path: inset(0 0 100% 0); }
        }
        .loading-text {
          margin-top: 16px;
          font-weight: 600;
          letter-spacing: 0.025em;
          color: #002B79; /* brand primary */
          animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
          0%, 100% { opacity: 1; }
          50% { opacity: .5; }
        }
      </style>
      <div id="initial-loader">
        <div class="loader-wrapper">
          <img src="/logo.png" class="logo-bg" alt="Loading" />
          <img src="/logo.png" class="logo-fg" alt="" aria-hidden="true" />
          <div class="loading-text">LOADING...</div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
